<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — ScoreOcs8</title>
<meta name="description" content="Football and badminton match previews, betting guides and league analysis from the ScoreOcs8 team.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#080b10;--bg2:#0d1117;--card:#0f1620;--card2:#141e2a;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--accent:#f97316;--accent2:#ea6a0a;--green:#00e5a0;--red:#ff4757;--blue:#3d8fff;--amber:#f5a623;--text:#e8edf5;--text2:#8a9ab5;--text3:#4a5a72;--ff:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.7;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;background:rgba(8,11,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--ff);font-size:22px;font-weight:700;letter-spacing:0.06em;color:var(--text);text-decoration:none;}
.nav-logo .hl{color:var(--accent);}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;padding:6px 11px;border-radius:4px;transition:color .2s,background .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(249,115,22,0.07);}
.wrap{max-width:900px;margin:0 auto;padding:3rem 2rem;position:relative;z-index:1;}
.page-head{margin-bottom:2.5rem;}
.stag{font-family:var(--fm);font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:8px;}
.stag::before{content:'';display:block;width:20px;height:1px;background:var(--accent);}
.page-title{font-family:var(--ff);font-size:42px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:.5rem;}
.page-sub{color:var(--text2);font-size:15px;}
.filter-row{display:flex;gap:10px;margin-bottom:2rem;flex-wrap:wrap;}
.chip{font-family:var(--fm);font-size:11px;letter-spacing:.05em;padding:6px 14px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;transition:all .2s;}
.chip:hover{border-color:rgba(249,115,22,.4);color:var(--text);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;display:flex;flex-direction:column;}
.card:hover{border-color:rgba(249,115,22,.35);transform:translateY(-2px);}
.card-img{height:160px;background:linear-gradient(135deg,var(--card2),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3);}
.card-img[data-has-img="1"]{background-size:cover;background-position:center;font-size:0;}
.card-body{padding:1.25rem;flex:1;display:flex;flex-direction:column;}
.card-cat{font-family:var(--fm);font-size:10px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;}
.card-title{font-family:var(--ff);font-size:19px;font-weight:600;letter-spacing:.02em;line-height:1.3;margin-bottom:.5rem;}
.card-excerpt{font-size:13px;color:var(--text2);flex:1;margin-bottom:1rem;}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--fm);font-size:11px;color:var(--text3);padding-top:.75rem;border-top:1px solid var(--border);}
.card-read{color:var(--accent);}
.empty{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4rem 2rem;text-align:center;color:var(--text3);}
.empty strong{display:block;color:var(--text2);font-family:var(--ff);font-size:18px;margin-bottom:.5rem;}
.post{max-width:780px;margin:0 auto;}
.post-back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;text-decoration:none;margin-bottom:1.5rem;transition:color .2s;}
.post-back:hover{color:var(--accent);}
.post-cat{font-family:var(--fm);font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;}
.post-title{font-family:var(--ff);font-size:36px;font-weight:700;letter-spacing:.02em;line-height:1.15;margin-bottom:.75rem;}
.post-meta{font-family:var(--fm);font-size:12px;color:var(--text3);margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.post-body{font-size:16px;line-height:1.8;color:var(--text);}
.post-body h1,.post-body h2,.post-body h3{font-family:var(--ff);letter-spacing:.02em;margin:2rem 0 1rem;}
.post-body h2{font-size:26px;}.post-body h3{font-size:20px;color:var(--accent);}
.post-body p{margin:1rem 0;}
.post-body a{color:var(--accent);text-decoration:underline;}
.post-body ul,.post-body ol{margin:1rem 0 1rem 2rem;}
.post-body li{margin:.4rem 0;}
.post-body code{background:var(--card2);padding:2px 6px;border-radius:3px;font-family:var(--fm);font-size:.9em;}
.post-body pre{background:var(--card2);padding:1rem;border-radius:6px;overflow-x:auto;margin:1rem 0;}
.post-body blockquote{border-left:3px solid var(--accent);padding-left:1rem;color:var(--text2);margin:1rem 0;}
.post-body img{max-width:100%;height:auto;border-radius:6px;margin:1rem 0;}
.loader{text-align:center;padding:3rem;color:var(--text3);font-family:var(--fm);font-size:12px;}
.err{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);color:var(--red);padding:1rem;border-radius:6px;font-size:13px;}
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:12px;position:relative;z-index:1;margin-top:4rem;}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Score<span class="hl">Ocs8</span></a>
  <ul class="nav-links">
    <li><a href="/">🏠 Home</a></li>
    <li><a href="/#predictions">📊 Predictions</a></li>
    <li><a href="/blog/" class="active">📝 Blog</a></li>
    <li><a href="/#faq">❓ FAQ</a></li>
  </ul>
</nav>

<div class="wrap">
  <div id="list-view">
    <div class="page-head">
      <div class="stag">Content Library</div>
      <h1 class="page-title">Blog</h1>
      <p class="page-sub">Match previews, league analysis and betting guides from the ScoreOcs8 team.</p>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="Football Prediction">Football</button>
      <button class="chip" data-filter="Badminton Prediction">Badminton</button>
      <button class="chip" data-filter="Malaysia Super League">MSL</button>
      <button class="chip" data-filter="EPL">EPL</button>
      <button class="chip" data-filter="UCL">UCL</button>
      <button class="chip" data-filter="FIFA World Cup">FIFA WC</button>
      <button class="chip" data-filter="Betting Guide">Guides</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <div id="post-view" class="post" style="display:none"></div>
</div>

<footer>
  © 2025 ScoreOcs8 · <a href="/" style="color:var(--text2);">Home</a> · <a href="/admin/" style="color:var(--text2);">Admin</a>
</footer>

<script>
(() => {
  const REPO = 'maefigma-crypto/scoreocs8';
  const BRANCH = 'main';
  const FOLDER = '_posts';
  const LIST_URL = `https://api.github.com/repos/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
  const CACHE_KEY = 'so8-blog-cache-v1';
  const CACHE_TTL = 10 * 60 * 1000;
  let posts = [];
  let activeFilter = 'all';

  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('en-MY', { year:'numeric', month:'short', day:'numeric' }); } catch { return iso || ''; } };

  function parseFrontmatter(md) {
    const m = md.match(/^---\s*\n([\s\S]+?)\n---\s*\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: md };
    const meta = {};
    for (const line of m[1].split('\n')) {
      const kv = line.match(/^([a-zA-Z_][a-zA-Z0-9_-]*):\s*(.*)$/);
      if (!kv) continue;
      let [, k, v] = kv;
      v = v.trim();
      if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) v = v.slice(1, -1);
      meta[k] = v;
    }
    return { meta, body: m[2] };
  }

  function slugOf(name) { return name.replace(/\.md$/, ''); }

  async function loadPosts() {
    const cached = readCache();
    if (cached) { posts = cached; return posts; }

    const res = await fetch(LIST_URL);
    if (res.status === 404) { posts = []; writeCache(posts); return posts; }
    if (!res.ok) throw new Error('GitHub API ' + res.status + ' — may be rate-limited (60/hr unauthenticated)');
    const files = (await res.json()).filter(f => f.type === 'file' && f.name.endsWith('.md'));
    const loaded = await Promise.all(files.map(async f => {
      const raw = await fetch(f.download_url).then(r => r.text());
      const { meta, body } = parseFrontmatter(raw);
      return {
        slug: slugOf(f.name),
        title: meta.title || f.name,
        date: meta.date || '',
        category: meta.category || 'General',
        league: meta.league || '',
        excerpt: meta.excerpt || '',
        featured_image: meta.featured_image || '',
        meta_title: meta.meta_title || '',
        meta_description: meta.meta_description || '',
        body,
      };
    }));
    loaded.sort((a, b) => new Date(b.date) - new Date(a.date));
    posts = loaded;
    writeCache(posts);
    return posts;
  }

  function readCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY); if (!raw) return null;
      const { t, v } = JSON.parse(raw);
      if (Date.now() - t > CACHE_TTL) return null;
      return v;
    } catch { return null; }
  }
  function writeCache(v) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), v })); } catch {} }

  function renderList() {
    const grid = document.getElementById('grid');
    const filtered = activeFilter === 'all' ? posts : posts.filter(p => p.category === activeFilter);
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1;"><strong>No posts yet</strong>${posts.length ? 'Nothing matches this filter.' : 'Publish from <a href="/admin/" style="color:var(--accent)">/admin/</a> to get started.'}</div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <a class="card" href="#${esc(p.slug)}">
        <div class="card-img"${p.featured_image?` style="background-image:url('${esc(p.featured_image)}')" data-has-img="1"`:''}>📄</div>
        <div class="card-body">
          <div class="card-cat">${esc(p.category)}</div>
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-excerpt">${esc(p.excerpt || p.body.slice(0, 140).replace(/[#*_`>\-]/g, '').trim() + '…')}</div>
          <div class="card-meta">
            <span>${fmtDate(p.date)}</span>
            <span class="card-read">Read →</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  function renderPost(slug) {
    const p = posts.find(x => x.slug === slug);
    const listView = document.getElementById('list-view');
    const postView = document.getElementById('post-view');
    if (!p) { showList(); return; }

    document.title = (p.meta_title || p.title) + ' — ScoreOcs8';
    const descEl = document.querySelector('meta[name="description"]');
    if (descEl && p.meta_description) descEl.setAttribute('content', p.meta_description);

    postView.innerHTML = `
      <a class="post-back" href="#" onclick="event.preventDefault();history.pushState({},'','/blog/');document.getElementById('list-view').style.display='block';document.getElementById('post-view').style.display='none';window.scrollTo(0,0);">← All posts</a>
      ${p.featured_image ? `<img src="${esc(p.featured_image)}" style="width:100%;height:auto;border-radius:8px;margin-bottom:1.5rem;" onerror="this.style.display='none'">` : ''}
      <div class="post-cat">${esc(p.category)}${p.league && p.league !== 'General' ? ' · ' + esc(p.league) : ''}</div>
      <h1 class="post-title">${esc(p.title)}</h1>
      <div class="post-meta">${fmtDate(p.date)}</div>
      <div class="post-body">${window.marked ? marked.parse(p.body) : '<pre>'+esc(p.body)+'</pre>'}</div>
    `;
    listView.style.display = 'none';
    postView.style.display = 'block';
    window.scrollTo(0, 0);
  }

  function showList() {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('post-view').style.display = 'none';
    document.title = 'Blog — ScoreOcs8';
  }

  function route() {
    const slug = window.location.hash.slice(1);
    if (slug) renderPost(decodeURIComponent(slug));
    else showList();
  }

  document.getElementById('filter-row').addEventListener('click', e => {
    const btn = e.target.closest('.chip'); if (!btn) return;
    document.querySelectorAll('#filter-row .chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
  });

  window.addEventListener('hashchange', route);

  (async () => {
    try {
      document.getElementById('grid').innerHTML = '<div class="loader" style="grid-column:1/-1;">Loading posts…</div>';
      await loadPosts();
      renderList();
      route();
    } catch (err) {
      document.getElementById('grid').innerHTML = `<div class="err">Could not load posts: ${esc(err.message)}</div>`;
    }
  })();
})();
</script>

</body>
</html>
