<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — ScoreOcs8</title>
<meta name="description" content="Football and badminton match previews, betting guides and league analysis from the ScoreOcs8 team.">
<link rel="canonical" href="https://scoreocs8.pages.dev/blog/">
<meta property="og:title" content="Blog — ScoreOcs8">
<meta property="og:description" content="Match previews, league analysis and betting guides.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://scoreocs8.pages.dev/blog/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--bg2:#0d1117;--card:#0f1620;--card2:#141e2a;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--accent:#f97316;--accent2:#ea6a0a;--green:#00e5a0;--red:#ff4757;--blue:#3d8fff;--amber:#f5a623;--text:#e8edf5;--text2:#8a9ab5;--text3:#4a5a72;--ff:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.7;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;background:rgba(8,11,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--ff);font-size:22px;font-weight:700;letter-spacing:0.06em;color:var(--text);text-decoration:none;}
.nav-logo .hl{color:var(--accent);}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;padding:6px 11px;border-radius:4px;transition:color .2s,background .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(249,115,22,0.07);}
.wrap{max-width:1000px;margin:0 auto;padding:3rem 2rem;position:relative;z-index:1;}
.page-head{margin-bottom:2rem;}
.stag{font-family:var(--fm);font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:8px;}
.stag::before{content:'';display:block;width:20px;height:1px;background:var(--accent);}
.page-title{font-family:var(--ff);font-size:42px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:.5rem;}
.page-sub{color:var(--text2);font-size:15px;}
.controls{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;align-items:center;justify-content:space-between;}
.filters{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-family:var(--fm);font-size:11px;letter-spacing:.05em;padding:6px 14px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;transition:all .2s;}
.chip:hover{border-color:rgba(249,115,22,.4);color:var(--text);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.langs{display:flex;gap:4px;border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.langs button{font-family:var(--fm);font-size:11px;padding:6px 12px;background:transparent;border:none;color:var(--text2);cursor:pointer;transition:all .2s;}
.langs button.active{background:var(--accent);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:all .2s;cursor:pointer;display:flex;flex-direction:column;text-decoration:none;color:inherit;}
.card:hover{border-color:rgba(249,115,22,.35);transform:translateY(-2px);}
.card-img{height:160px;background:linear-gradient(135deg,var(--card2),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3);background-size:cover;background-position:center;}
.card-body{padding:1.25rem;flex:1;display:flex;flex-direction:column;}
.card-cat{font-family:var(--fm);font-size:10px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;}
.card-title{font-family:var(--ff);font-size:19px;font-weight:600;letter-spacing:.02em;line-height:1.3;margin-bottom:.5rem;}
.card-excerpt{font-size:13px;color:var(--text2);flex:1;margin-bottom:1rem;}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--fm);font-size:11px;color:var(--text3);padding-top:.75rem;border-top:1px solid var(--border);}
.card-read{color:var(--accent);}
.empty{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4rem 2rem;text-align:center;color:var(--text3);grid-column:1/-1;}
.empty strong{display:block;color:var(--text2);font-family:var(--ff);font-size:18px;margin-bottom:.5rem;}
.pagination{display:flex;gap:8px;justify-content:center;margin-top:3rem;}
.pagination button{font-family:var(--fm);font-size:12px;padding:8px 14px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:4px;cursor:pointer;transition:all .2s;}
.pagination button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}
.pagination .current{background:var(--accent);color:#fff;border-color:var(--accent);}
.loader{text-align:center;padding:3rem;color:var(--text3);font-family:var(--fm);font-size:12px;grid-column:1/-1;}
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:12px;position:relative;z-index:1;margin-top:4rem;}
footer a{color:var(--text2);text-decoration:none;margin:0 .5rem;}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Score<span class="hl">Ocs8</span></a>
  <ul class="nav-links">
    <li><a href="/">🏠 Home</a></li>
    <li><a href="/#predictions">📊 Predictions</a></li>
    <li><a href="/blog/" class="active">📝 Blog</a></li>
    <li><a href="/#faq">❓ FAQ</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="page-head">
    <div class="stag">Content Library</div>
    <h1 class="page-title">Blog</h1>
    <p class="page-sub">Match previews, league analysis and betting guides from the ScoreOcs8 team.</p>
  </div>

  <div class="controls">
    <div class="filters" id="filters">
      <button class="chip active" data-league="">All</button>
      <button class="chip" data-league="MSL">🇲🇾 MSL</button>
      <button class="chip" data-league="EPL">🏴󠁧󠁢󠁥󠁮󠁧󠁿 EPL</button>
      <button class="chip" data-league="UCL">⭐ UCL</button>
      <button class="chip" data-league="FIFA">🏆 FIFA WC</button>
      <button class="chip" data-league="BWF">🏸 BWF</button>
      <button class="chip" data-league="General">📝 Guides</button>
    </div>
    <div class="langs" id="langs">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="bm">BM</button>
      <button data-lang="zh">中文</button>
    </div>
  </div>

  <div id="grid" class="grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<footer>© 2025 ScoreOcs8 · <a href="/">Home</a> · <a href="/admin/">Admin</a></footer>

<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":"ScoreOcs8","url":"https://scoreocs8.pages.dev/","potentialAction":{"@type":"SearchAction","target":"https://scoreocs8.pages.dev/blog/?q={search_term_string}","query-input":"required name=search_term_string"}}
</script>

<script>
(() => {
  const API = '/api/blog/list';
  let lang = 'en', league = '', page = 1;
  const limit = 12;

  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('en-MY', { year:'numeric', month:'short', day:'numeric' }); } catch { return ''; } };

  async function load() {
    const grid = document.getElementById('grid');
    const pag = document.getElementById('pagination');
    grid.innerHTML = '<div class="loader">Loading posts…</div>';
    pag.innerHTML = '';
    const params = new URLSearchParams({ lang, page: String(page), limit: String(limit) });
    if (league) params.set('league', league);
    try {
      const res = await fetch(`${API}?${params}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      grid.innerHTML = `<div class="empty"><strong>Could not load posts</strong>${esc(err.message)}</div>`;
    }
  }

  function render(data) {
    const grid = document.getElementById('grid');
    const pag = document.getElementById('pagination');
    if (!data.posts?.length) {
      grid.innerHTML = `<div class="empty"><strong>No posts yet</strong>${league?'Nothing in this filter.':'Publish from <a href="/admin/" style="color:var(--accent)">/admin/</a> to get started.'}</div>`;
      return;
    }
    grid.innerHTML = data.posts.map(p => `
      <a class="card" href="/blog/${esc(p.slug)}/${lang!=='en'?`?lang=${lang}`:''}">
        <div class="card-img"${p.featured_image?` style="background-image:url('${esc(p.featured_image)}')"`:''}>${p.featured_image?'':'📄'}</div>
        <div class="card-body">
          <div class="card-cat">${esc(p.category || 'General')}</div>
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-excerpt">${esc(p.excerpt || '')}</div>
          <div class="card-meta"><span>${esc(fmtDate(p.date))}</span><span class="card-read">Read →</span></div>
        </div>
      </a>
    `).join('');

    if (data.pages > 1) {
      const pages = [];
      for (let i = 1; i <= data.pages; i++) pages.push(i);
      pag.innerHTML = `
        <button${page===1?' disabled':''} data-page="${page-1}">‹ Prev</button>
        ${pages.map(n => `<button class="${n===page?'current':''}" data-page="${n}">${n}</button>`).join('')}
        <button${page===data.pages?' disabled':''} data-page="${page+1}">Next ›</button>
      `;
      pag.querySelectorAll('button[data-page]').forEach(b => b.addEventListener('click', () => { page = parseInt(b.dataset.page, 10); load(); window.scrollTo(0, 0); }));
    }
  }

  document.getElementById('filters').addEventListener('click', e => {
    const b = e.target.closest('.chip'); if (!b) return;
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    league = b.dataset.league || '';
    page = 1;
    load();
  });
  document.getElementById('langs').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#langs button').forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    lang = b.dataset.lang;
    load();
  });

  load();
})();
</script>
</body>
</html>
