name = "scoreocs8"
main = "worker.js"
compatibility_date = "2025-09-01"
workers_dev = true

# KV namespace for caching. Create with:
#   wrangler kv namespace create CACHE
#   wrangler kv namespace create CACHE --preview
# then paste the returned IDs below.
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Secrets (set via `wrangler secret put <NAME>` — do NOT put values in this file):
#   wrangler secret put API_FOOTBALL_KEY
#   wrangler secret put ODDS_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY
