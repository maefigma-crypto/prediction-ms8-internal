<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ScoreOcs8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--card:#0f1620;--border:rgba(255,255,255,0.08);--accent:#f97316;--text:#e8edf5;--text2:#8a9ab5;--ff:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:2.5rem;max-width:400px;width:100%;}
.logo{font-family:var(--ff);font-size:26px;font-weight:700;letter-spacing:0.06em;text-align:center;margin-bottom:0.5rem;}
.logo .hl{color:var(--accent);}
.sub{color:var(--text2);text-align:center;font-size:14px;margin-bottom:2rem;}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;margin-bottom:12px;transition:all .2s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn svg{width:18px;height:18px;}
.divider{text-align:center;color:var(--text2);font-size:12px;margin:1.5rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
#tg-widget{display:flex;justify-content:center;margin-top:12px;}
.trial{background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:4px;padding:12px;font-size:12px;color:var(--text2);text-align:center;margin-top:1.5rem;}
.trial strong{color:var(--accent);}
.note{font-size:11px;color:var(--text2);text-align:center;margin-top:1rem;opacity:0.7;}
#status{margin-top:1rem;font-size:13px;text-align:center;min-height:20px;}
#status.err{color:#ff4757;}#status.ok{color:#00e5a0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Score<span class="hl">Ocs8</span></div>
  <div class="sub">Sign in to unlock AI predictions</div>

  <a class="btn" href="/api/auth/google/start">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8c1.8-4.3 6-7.5 11.1-7.5 3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C41.4 35.4 44 30.1 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
    Continue with Google
  </a>

  <div class="divider">or</div>

  <div id="tg-widget"></div>
  <div class="note">Telegram widget loads if bot username is configured.</div>

  <div id="status"></div>

  <div class="trial">🎁 Free <strong>2-day trial</strong> — full access. No card required.</div>
</div>

<script>
const TG_BOT_USERNAME = window.TG_BOT_USERNAME || '';

if (TG_BOT_USERNAME) {
  const s = document.createElement('script');
  s.async = true;
  s.src = 'https://telegram.org/js/telegram-widget.js?22';
  s.setAttribute('data-telegram-login', TG_BOT_USERNAME);
  s.setAttribute('data-size', 'large');
  s.setAttribute('data-onauth', 'onTelegramAuth(user)');
  s.setAttribute('data-request-access', 'write');
  document.getElementById('tg-widget').appendChild(s);
}

function setStatus(msg, kind) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = kind || '';
}

window.onTelegramAuth = async function(user) {
  setStatus('Signing in…');
  try {
    const res = await fetch('/api/auth/telegram', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(user),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'login failed');
    setStatus('Signed in. Redirecting…', 'ok');
    setTimeout(() => { window.location.href = '/'; }, 500);
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
};

fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.authenticated) {
    setStatus('Already signed in as ' + (d.user.name || d.user.email) + '. Redirecting…', 'ok');
    setTimeout(() => { window.location.href = '/'; }, 800);
  }
});
</script>
</body>
</html>
