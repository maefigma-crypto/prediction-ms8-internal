<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ScoreOcs8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--card:#0f1620;--border:rgba(255,255,255,0.08);--accent:#f97316;--text:#e8edf5;--text2:#8a9ab5;--ff:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:2.5rem;max-width:400px;width:100%;}
.logo{font-family:var(--ff);font-size:26px;font-weight:700;letter-spacing:0.06em;text-align:center;margin-bottom:0.5rem;}
.logo .hl{color:var(--accent);}
.sub{color:var(--text2);text-align:center;font-size:14px;margin-bottom:2rem;}
.btn-tg{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:8px;border:none;background:#229ED9;color:#fff;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s;}
.btn-tg:hover{background:#1a8bbf;}
.btn-tg svg{width:22px;height:22px;}
.trial{background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:4px;padding:12px;font-size:12px;color:var(--text2);text-align:center;margin-top:1.5rem;}
.trial strong{color:var(--accent);}
.note{font-size:11px;color:var(--text2);text-align:center;margin-top:1rem;opacity:0.7;}
#status{margin-top:1rem;font-size:13px;text-align:center;min-height:20px;}
#status.err{color:#ff4757;}#status.ok{color:#00e5a0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Score<span class="hl">Ocs8</span></div>
  <div class="sub">Sign in with Telegram to unlock AI predictions</div>

  <a href="/api/auth/telegram/start" class="btn-tg">
    <svg viewBox="0 0 24 24" fill="#fff"><path d="M21.944 2.506a1.5 1.5 0 0 0-1.521-.234L2.43 9.288a1.5 1.5 0 0 0 .09 2.813l4.193 1.398 1.638 5.113a1.5 1.5 0 0 0 2.567.515l2.33-2.803 4.573 3.37a1.5 1.5 0 0 0 2.352-1.01l2.25-14.25a1.5 1.5 0 0 0-.479-1.928Z"/></svg>
    Continue with Telegram
  </a>

  <div id="status"></div>

  <div class="trial">🎁 Free <strong>2-day trial</strong> — full access. No card required.</div>
  <div class="note">Email + password sign-up coming soon when the money site connects.</div>
</div>

<script>
function setStatus(msg, kind) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = kind || '';
}

// If already signed in, redirect to homepage.
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.authenticated) {
    setStatus('Already signed in as ' + (d.user.name || d.user.email || 'user') + '. Redirecting…', 'ok');
    setTimeout(() => { window.location.href = '/'; }, 800);
  }
}).catch(() => {});
</script>
</body>
</html>
